ideas:
  - title: eslint-plugin-baseline-nodejs
    tags:
      - ESLint
      - JavaScript
      - Node.js
    description: |
      An [ESLint] plugin that will tell you, given the minimum Node.js version
      you're targeting, whenever you're using language and runtime APIs that
      aren't yet supported.

      Basically, [eslint-plugin-baseline-js], but for a given version of Node.js
      instead of the web.

      [eslint]: https://eslint.org/
      [eslint-plugin-baseline-js]: https://baselinejs.vercel.app/
  - title: Go linter for docs
    tags:
      - Documentation
      - Go
    description: |
      A simple Go CLI that checks Go codebases and ensures all doc comments
      follow the [official guidelines]. See also related tooling: [godot].

      [official guidelines]: https://tip.golang.org/doc/comment
      [godot]: https://github.com/tetafro/godot
  - title: Justfile2Makefile
    tags:
      - Tooling
    description: |
      A simple way to convert a [`Justfile`] to a `Makefile` or vice versa. Two
      motivations: it 1) makes it easier to switch between different command
      runners and 2) makes it possible to "run" a `Justfile` using Make. The
      latter can be useful when contributing to a project that is using a
      command runner you don't have installed – just convert it and run it with
      the command runner you have.

      Now, the irony of installing some program to do the conversion instead of
      installing the command runner is not lost on me. One reason for this can
      be that the command runner is not available on the OS you're using.
      Another is that if you can convert between many formats, you only need one
      command runner and one converter, rather than many command runners.

      [`justfile`]: https://just.systems/
  - title: npm audit for libraries
    tags:
      - Node.js
      - Vulnerability Management
    description: |
      An improved `npm audit` that understands libraries. That is, it does not
      complain if you depend on a vulnerable version as long as your consumers
      can upgrade to a safe version because of version ranges. This need not be
      a dedicated tool. Adding support for this to an existing tool could work
      too. Also, this idea can be applied to other ecosystems too.

      See also related tooling: [better-npm-audit] and [npmaargh].

      [better-npm-audit]: https://www.npmjs.com/package/better-npm-audit
      [npmaargh]: https://www.npmjs.com/package/npmaargh
  - title: Testable JSDoc examples
    tags:
      - Documentation
      - JavaScript
      - Testing
    description: |
      Like [Testable Examples in Go] and [documentation tests in Rust], a tool
      that runs a project's JSDoc `@example`s to ensure they're correct.

      [testable examples in go]: https://go.dev/blog/examples
      [documentation tests in rust]: https://doc.rust-lang.org/rust-by-example/testing/doc_testing.html
  - title: Unused ESLint rule detector
    tags:
      - ESLint
      - JavaScript
    description: |
      [ESLint] is a linter for JavaScript with tons of rules and plugins with
      even more rules. I like to have all rules configured explicitly, however
      it can be hard to keep track of all rules, especially as updates come in.
      Hence, I'd like to have a tool which, given an ESLint configuration file,
      complains about any unconfigured rules.

      [eslint]: https://eslint.org/
  - title: Documentation snippet testing
    tags:
      - Documentation
      - Markdown
      - Testing
    description: |
      Snippets in documentation should just work; if they don't it's incredibly
      frustrating for the reader. So, why don't we test them in an automated
      fashion like the rest of our software? Testable examples ([Go], [Rust])
      are a first step, but these do not apply to Markdown-based documentation
      files. Also, [ESLint] supports linting code blocks in Markdown which
      provides some confidence they're correct, but it's not enough.

      Basically, I want a tool that runs the code snippets in Markdown files to
      ensure they will work when users try to run them. I have built a bespoke
      proof of concept that only runs shell blocks, [`docs.test.js`], if you
      want to get an idea or need some inspiration.

      [go]: https://go.dev/blog/examples
      [rust]: https://doc.rust-lang.org/rust-by-example/testing/doc_testing.html
      [eslint]: https://www.npmjs.com/package/@eslint/markdown
      [`docs.test.js`]: https://github.com/ericcornelissen/js-regex-security-scanner/blob/d325ebf4d5888cc1ff82fc0a0e16bd81a1f20df9/tests/docs.test.js
